<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semi Nur Erdoğan</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Pro:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0b0906;--bg2:#141009;--gold:#c9a84c;--gold2:#e8c87a;--cream:#ede6d5;--muted:#8a7f6a;--line:rgba(201,168,76,.15)}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--cream);font-family:'Crimson Pro',serif;font-size:18px;line-height:1.75}
    nav{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;justify-content:space-between;align-items:center;padding:1.1rem 3rem;background:linear-gradient(to bottom,rgba(11,9,6,.96),rgba(11,9,6,.7),transparent)}
    .nav-logo{font-family:'Playfair Display',serif;color:var(--gold);text-decoration:none;font-style:italic;letter-spacing:.1em}
    .nav-links{display:flex;align-items:center;gap:1.5rem;list-style:none}
    .nav-links a,.lang-btn{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-decoration:none;background:none;border:none;cursor:pointer}
    .nav-links a:hover,.lang-btn:hover{color:var(--gold2)}
    .lang-wrap{display:flex;border:1px solid var(--line);overflow:hidden}
    .lang-btn{padding:.35rem .7rem}
    .lang-btn.active{background:var(--gold);color:var(--bg)}
    section{padding:6rem 3rem;position:relative}
    .section-header{display:flex;align-items:center;gap:1rem;margin-bottom:3rem}
    .section-num{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--gold);letter-spacing:.12em}
    .section-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,3.6vw,2.7rem)}
    .section-rule{flex:1;height:1px;background:var(--line);max-width:200px}
    #hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding-top:5rem}
    .hero-eyebrow{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:1.4rem}
    .hero-name{font-family:'Playfair Display',serif;font-size:clamp(3.2rem,9vw,7rem);line-height:.92;margin-bottom:1.8rem}
    .hero-name em{font-style:italic;color:var(--gold2)}
    .hero-tagline{max-width:650px;font-size:clamp(1rem,2vw,1.25rem);color:var(--muted)}
    .hero-cta{display:flex;gap:1rem;margin-top:2rem;flex-wrap:wrap}
    .btn{display:inline-block;padding:.8rem 1.5rem;text-decoration:none;font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase}
    .btn-primary{background:var(--gold);color:var(--bg)}
    .btn-secondary{border:1px solid var(--line);color:var(--cream)}
    #about,#skills,#contact{background:var(--bg2)}
    .about-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:3rem}
    .about-body p{margin-bottom:1.2rem;color:var(--muted);font-size:1.08rem}
    .card-stack{display:grid;gap:1rem}
    .card{border:1px solid var(--line);background:rgba(201,168,76,.05);padding:1.2rem 1.3rem}
    .card-label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:.35rem}
    .card-value{color:var(--cream)}
    .card-value small{display:block;color:var(--muted);margin-top:.2rem}
    .projects-list,.experience-list{display:flex;flex-direction:column;gap:1.5rem}
    .project,.exp-card{display:grid;grid-template-columns:90px 1fr auto;gap:1.5rem;padding:2rem 0;border-top:1px solid var(--line)}
    .project:last-child,.exp-card:last-child{border-bottom:1px solid var(--line)}
    .project-year,.exp-year{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--gold);letter-spacing:.1em;padding-top:.2rem}
    .project-tag{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.5rem}
    .project-name,.exp-title{font-family:'Playfair Display',serif;font-size:1.55rem;margin-bottom:.5rem}
    .project-desc,.exp-desc{color:var(--muted)}
    .exp-sub{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold2);margin-bottom:.5rem}
    .pills{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:1rem}
    .pill,.status{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:.22rem .55rem;border:1px solid var(--line);color:var(--muted)}
    .status.wip{color:var(--gold);border-color:rgba(201,168,76,.35)}
    .skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:2rem}
    .skill-group h3{font-family:'Playfair Display',serif;font-size:1.06rem;color:var(--gold2);font-style:italic;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--line)}
    .skill-item{margin-bottom:1rem}
    .skill-top{display:flex;justify-content:space-between;gap:1rem;margin-bottom:.35rem}
    .skill-name{color:var(--cream)}
    .skill-level{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--gold)}
    .bar{height:2px;background:rgba(255,255,255,.08);position:relative}
    .bar span{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(to right,var(--gold),var(--gold2))}
    .contact-wrap{max-width:700px}
    .contact-big{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.8rem);line-height:1.1;margin-bottom:1rem}
    .contact-big em{font-style:italic;color:var(--gold2)}
    .contact-sub{max-width:520px;color:var(--muted);margin-bottom:2rem}
    .contact-btns{display:flex;gap:1rem;flex-wrap:wrap}
    .cta-link{display:inline-flex;align-items:center;gap:.7rem;padding:.8rem 1.4rem;border:1px solid var(--line);color:var(--cream);text-decoration:none;font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase}
    .cta-dot{width:6px;height:6px;border-radius:50%;background:var(--gold)}
    footer{padding:1.5rem 3rem;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap}
    footer p{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    #writings{background:var(--bg)}
    .writings-list{display:flex;flex-direction:column;gap:0}
    .writing-card{display:grid;grid-template-columns:90px 1fr auto;gap:1.5rem;padding:2rem 0;border-top:1px solid var(--line);text-decoration:none;transition:background .2s}
    .writing-card:last-child{border-bottom:1px solid var(--line)}
    .writing-card:hover .writing-title{color:var(--gold2)}
    .writing-date{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--gold);letter-spacing:.1em;padding-top:.25rem;line-height:1.4}
    .writing-tag{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.5rem}
    .writing-title{font-family:'Playfair Display',serif;font-size:1.45rem;margin-bottom:.4rem;color:var(--cream);transition:color .2s}
    .writing-excerpt{color:var(--muted);font-size:1rem}
    .writing-arrow{font-size:1.2rem;color:var(--gold);align-self:center;opacity:0;transition:opacity .2s,transform .2s}
    .writing-card:hover .writing-arrow{opacity:1;transform:translateX(4px)}
    @media (max-width: 900px){
      nav{padding:1rem 1.2rem}
      section{padding:5rem 1.2rem}
      .about-grid{grid-template-columns:1fr}
      .project,.exp-card,.writing-card{grid-template-columns:1fr}
      .writing-arrow{display:none}
      footer{padding:1.2rem;flex-direction:column;text-align:center}
    }
    @media (max-width: 600px){
      .nav-links li:not(:last-child){display:none}
      .hero-name{font-size:3rem}
    }
  </style>
</head>

      document.getElementById('experience-list').innerHTML = d.experiences.map(function(e) {
        return '<article class="exp-card"><div class="exp-year">'+e.year+'</div><div><h3 class="exp-title">'+e.title+'</h3><div class="exp-sub">'+e.sub+'</div><p class="exp-desc">'+e.desc+'</p></div><div></div></article>';
      }).join('');
      document.getElementById('skills-title').textContent = d.skillsTitle;
      document.getElementById('skills-grid').innerHTML = d.skillGroups.map(function(g) {
        return '<div class="skill-group"><h3>'+g.title+'</h3>'+g.items.map(function(item){
          return '<div class="skill-item"><div class="skill-top"><span class="skill-name">'+item[0]+'</span><span class="skill-level">'+item[1]+'</span></div><div class="bar"><span style="width:'+item[2]+'%"></span></div></div>';
        }).join('')+'</div>';
      }).join('');
      document.getElementById('writings-title').textContent = d.writingsTitle;
      var wList = document.getElementById('writings-list');
      if (d.writings.length === 0) {
        wList.innerHTML = '<p style="color:var(--muted);font-family:\'DM Mono\',monospace;font-size:.75rem;letter-spacing:.12em;">'+d.writingsEmpty+'</p>';
      } else {
        wList.innerHTML = d.writings.map(function(w) {
          return '<a class="writing-card" href="'+w.file+'"><div class="writing-date">'+w.date+'</div><div><span class="writing-tag">'+w.tag+'</span><h3 class="writing-title">'+w.title+'</h3><p class="writing-excerpt">'+w.excerpt+'</p></div><div class="writing-arrow">&#8594;</div></a>';
        }).join('');
      }
      document.getElementById('contact-title').textContent = d.contactTitle;
      document.getElementById('contact-h1').textContent = d.contact.h1;
      document.getElementById('contact-h2').textContent = d.contact.h2;
      document.getElementById('contact-sub').textContent = d.contact.sub;
      document.getElementById('email-label').textContent = d.contact.emailLabel;
      document.getElementById('footer-loc').textContent = d.footer;
      document.getElementById('btn-tr').classList.toggle('active', currentLang === 'tr');
      document.getElementById('btn-en').classList.toggle('active', currentLang === 'en');
    }

    document.getElementById('btn-tr').addEventListener('click', function(){ currentLang = 'tr'; renderPage(); });
    document.getElementById('btn-en').addEventListener('click', function(){ currentLang = 'en'; renderPage(); });
    renderPage();
  </script>
</body>
</html>
