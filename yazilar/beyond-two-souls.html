<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beyond: Two Souls Üzerine — Semi Nur Erdoğan</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Pro:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f2ea;--bg2:#ede6d5;--gold:#9a6f2a;--gold2:#b8860b;--cream:#1a1208;--muted:#6b5a3e;--line:rgba(154,111,42,.18)}
    html{scroll-behavior:smooth}
    body{
      background:var(--bg);
      background-image:url('beyond-bg.png');
      background-size:cover;
      background-position:center top;
      background-attachment:fixed;
      color:var(--cream);
      font-family:'Crimson Pro',serif;
      font-size:18px;
      line-height:1.75;
      position:relative;
    }
    body::before{
      content:'';
      position:fixed;
      inset:0;
      background:rgba(247,242,234,.22);
      z-index:0;
    }
    nav,footer,.post-wrap{position:relative;z-index:1}
    nav{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;justify-content:space-between;align-items:center;padding:1.1rem 3rem;background:linear-gradient(to bottom,rgba(247,242,234,.97),rgba(247,242,234,.7),transparent)}
    .nav-logo{font-family:'Playfair Display',serif;color:var(--gold);text-decoration:none;font-style:italic;letter-spacing:.1em}
    .back-link{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-decoration:none}
    .back-link:hover{color:var(--gold2)}
    .lang-wrap{display:flex;border:1px solid var(--line);overflow:hidden}
    .lang-btn{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;padding:.35rem .7rem;background:none;border:none;cursor:pointer;color:var(--muted)}
    .lang-btn:hover{color:var(--gold2)}
    .lang-btn.active{background:var(--gold);color:#fff}
    .post-wrap{max-width:660px;margin:0 auto;padding:7rem 0 6rem}
    .post-meta{display:flex;gap:1.5rem;align-items:center;margin-bottom:2.5rem;flex-wrap:wrap}
    .post-tag{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
    .post-date{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.14em;color:var(--muted)}
    .post-sep{width:1px;height:12px;background:var(--line)}
    .post-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.2rem);line-height:1.1;margin-bottom:.6rem}
    .post-title em{font-style:italic;color:var(--gold2)}
    .post-subtitle{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--muted);font-style:italic;margin-bottom:1.8rem}
    .post-rule{height:1px;background:var(--line);margin-bottom:2.5rem}
    .post-body p{margin-bottom:1.4rem;color:var(--muted);font-size:1.12rem;line-height:1.85}
    .post-body p:first-child{color:var(--cream)}
    .post-body h2{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--cream);margin:2.5rem 0 1rem;font-style:italic}
    .post-body blockquote{border-left:2px solid var(--gold);padding-left:1.2rem;margin:1.5rem 0;color:var(--muted);font-style:italic}
    .post-body strong{color:var(--cream);font-weight:600}
    .post-footer{margin-top:3.5rem;padding-top:2rem;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
    .post-author{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
    .back-btn{display:inline-flex;align-items:center;gap:.6rem;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);text-decoration:none}
    .back-btn:hover{color:var(--gold2)}
    footer{padding:1.5rem 3rem;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap}
    footer p{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    @media(max-width:700px){nav{padding:1rem 1.2rem}.post-wrap{padding:8rem 1.2rem 4rem}footer{padding:1.2rem;flex-direction:column;text-align:center}}
  </style>
</head>
<body>
  <nav>
    <a href="../index.html" class="nav-logo">S.N.E.</a>
    <div style="display:flex;align-items:center;gap:1.5rem">
      <a href="../index.html#writings" class="back-link">← Yazılar</a>
      <div class="lang-wrap">
        <button class="lang-btn" id="btn-tr" onclick="setLang('tr')">TR</button>
        <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </nav>

  <div class="post-wrap">
<div class="post-meta">
      <span class="post-tag" id="post-tag"></span>
      <div class="post-sep"></div>
      <span class="post-date" id="post-date"></span>
    </div>
    <h1 class="post-title" id="post-title"></h1>
    <p class="post-subtitle" id="post-subtitle"></p>
    <div class="post-rule"></div>
    <div class="post-body" id="post-body"></div>
    <div class="post-footer">
      <span class="post-author">Semi Nur Erdoğan</span>
      <a href="../index.html#writings" class="back-btn" id="back-btn"></a>
    </div>
  </div>

  <footer>
    <p>© 2026 Semi Nur Erdoğan</p>
    <p>Istanbul, Türkiye</p>
  </footer>

  <script>
    var posts = {
      tr: {
        tag: "Oyun İncelemesi",
        date: "1 Mayıs 2026",
        title: "Beyond: Two Souls Üzerine",
        subtitle: "Kronoloji, Kamera ve Bir Sahnenin Verdiği Özgürlük",
        backBtn: "← Tüm Yazılar",
        body: [
          "Beyond: Two Souls'u orijinal sırayla, yani oyunun bize sunduğu kronolojik olmayan düzende oynadım. Kronolojik seçeneği kullanmadım — çünkü sahneleri bu sıraya koymak David Cage'in bilinçli bir kararı ve oyunu onun kurduğu gibi deneyimlemek istedim. Ama kronolojik olmayan anlatının amacını yalnızca merak yaratmak olarak okumak bence eksik bir okuma. Asıl mesele yazarın oyuncuya neyi hissettirmek istediği. Bu, bazen doğrusal olmayan bir yapıyla verilir; bazen bir diyalogla, bazen tek bir sahneyle. Kendi geliştirdiğim Dark of the Knight'ta da benzer bir yapıyı kullanıyorum — bu yüzden Cage'in tercihine hem oyuncu hem de hikâye yazarı olarak baktım.",
          "Sinematik format beni gerçekten etkiledi. Oyunun ilk bölümlerinde adeta film izliyormuşum gibi hissettim; zamanla fark ettim ki filmin içindeyim. Özellikle bir noktada kendimi gerçekten Aiden gibi hissetmeye başladım. Ryan ve Jodie'nin yemek sahnesini hatırlıyorum — eşyaları devirebilirdim, ortamı bozabilirdim. Hiçbir şey yapmadım. Sadece izledim. O serbestliğin kendisi bile çok güçlü bir tasarım kararıydı.",
          "Oynanış tarafında ise zorlandığımı söylemeliyim. Oyunu PC'de oynadım; kontrolların zorluğunun kısmen bununla ilgili olup olmadığını bilemiyorum. Ama asıl sorun, sahneden sahneye değişen kamera açılarının getirdiği değişken yön kontrolleri. The Last of Us, God of War, Red Dead Redemption gibi oyunlara alışkın biri olarak bu bana zor geldi. Aynı firma bunu Detroit: Become Human'da çok daha dengeli bir biçimde çözmüştü — tam serbest değil ama çok daha akıcı. Yine de şunu belirtmek gerekiyor: bu kamera tercihleri, sinematik hissi yaratan araçların tam da kendisi. Eleştirdiğim şey, aynı zamanda oyunun en özgün yanlarından biri.",
          "Hikâyesel açıdan son derece tatmin ediciydi. Bir hikâyenin gelişimini ve sonunu önceden tahmin edemiyorsanız, o hikâye büyük olasılıkla güçlü bir hikâyedir. Bu yargı elbette kişisel oyun deneyimiyle de ilgili — daha çok oyun oynandıkça o tahmin mekanizması da keskinleşiyor.",
          "Son sahne bende hem güçlü bir devam oyunu gelecek hissi bıraktı hem de belirgin bir rahatsızlık. Yarım bırakılan sonlardan pek hoşlanmam — The Last of Us Part II'nin Ellie'nin evden uzaklaştığı final sahnesi gibi. Bu tür bitişler bende stres yaratıyor. Ama belki de yazarın oyuncuya hissettirmek istediği tam olarak bu; bunu kesin olarak bilemeyiz. Eğer bir devam ya da uyarlama gelecekse — ki bir dizi çalışması gündemde — bu, neredeyse mükemmel kurulmuş bir başlangıç noktası."
        ]
      },
      en: {
        tag: "Game Review",
        date: "May 1, 2026",
        title: "On Beyond: Two Souls",
        subtitle: "Chronology, Camera, and the Freedom of One Scene",
        backBtn: "← All Writing",
        body: [
          "I played Beyond: Two Souls in its original order — the non-chronological sequence the game presents by default. I chose not to use the chronological mode, because presenting scenes out of order is a deliberate decision by David Cage, and I wanted to experience it as intended. But reducing non-linear storytelling to a tool for building suspense misses the point. The real question is what the writer wants the player to feel — and that can be delivered through structure, through dialogue, or through a single well-placed scene. I use a similar structure in my own project, Dark of the Knight, so I came to Cage's choice both as a player and as someone who has made the same decision.",
          "The cinematic format worked on me. In the early sections I felt like I was watching a film; gradually, I realized I was inside one. At some point I started genuinely feeling like Aiden. I remember the dinner scene between Ryan and Jodie — I could have knocked things over, disrupted the moment. I did nothing. I just watched and let it be. That freedom to do nothing was itself a meaningful design choice.",
          "On the gameplay side, I struggled. I played on PC; whether that contributed to the control difficulties, I cannot say for certain. But the core issue was the shifting directional controls tied to cinematic camera angles. Coming from games like The Last of Us, God of War, and Red Dead Redemption, this was difficult to navigate. The same studio handled it far more fluidly in Detroit: Become Human — not fully open, but much more comfortable. That said, those camera choices are precisely what generates the cinematic feeling. The thing I found difficult is also one of the game's most distinctive qualities.",
          "The story was deeply satisfying. If you cannot predict where a narrative is going — not roughly, not even loosely — it is doing something right. That instinct sharpens with more games played, so I am aware my reading is still early.",
          "The final scene left me with two things: a strong sense that a continuation is coming, and a distinct discomfort. I do not respond well to ambiguous endings — the kind where a character walks away and the screen cuts to black, like the final scene of The Last of Us Part II. These endings raise my stress level. But perhaps that is precisely what the writer intends. We cannot know for certain. If a follow-up is coming — and a television adaptation is reportedly in development — this was a near-perfect place to leave things open."
        ]
      }
    };

    var currentLang = 'en';

    function setLang(lang) {
      currentLang = lang;
      var d = posts[lang];
      document.getElementById('post-tag').textContent = d.tag;
      document.getElementById('post-date').textContent = d.date;
      document.getElementById('post-title').textContent = d.title;
      document.getElementById('post-subtitle').textContent = d.subtitle;
      document.getElementById('back-btn').textContent = d.backBtn;
      document.getElementById('post-body').innerHTML = d.body.map(function(p){
        return '<p>' + p + '</p>';
      }).join('');
      document.getElementById('btn-tr').classList.toggle('active', lang === 'tr');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    }

    setLang('tr');
  </script>
</body>
</html>
